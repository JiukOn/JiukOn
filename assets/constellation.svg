
    <svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
                <feGaussianBlur stdDeviation="3" result="blur"/>
                <feComposite in="SourceGraphic" in2="blur" operator="over"/>
            </filter>
            
            <radialGradient id="blackHoleGrad">
                <stop offset="0%" stop-color="#050505" />
                <stop offset="70%" stop-color="#050505" />
                <stop offset="85%" stop-color="#8b5cf6" />
                <stop offset="95%" stop-color="#00d4ff" />
                <stop offset="100%" stop-color="transparent" />
            </radialGradient>

            <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#8b5cf6" />
                <stop offset="100%" stop-color="#00d4ff" />
            </linearGradient>

            <style>
                @keyframes orbit {
                    from { transform: rotate(0deg); }
                    to { transform: rotate(360deg); }
                }
                @keyframes focus-zoom {
                    0%, 100% { transform: scale(1); opacity: 0.4; }
                    50% { transform: scale(1.1); opacity: 1; }
                }
                .main-container { transform-origin: center; animation: orbit 120s linear infinite; }
                .star-group { transform-origin: center; animation: focus-zoom 18s ease-in-out infinite; }
                .star-label { font-weight: bold; pointer-events: none; text-shadow: 0 0 5px #050505; }
                .event-horizon { animation: orbit 20s linear infinite reverse; transform-origin: center; }
            </style>
        </defs>

        <rect width="100%" height="100%" fill="#0d1117" rx="15" />
        
        <g class="event-horizon">
            <circle cx="400" cy="150" r="60" fill="url(#blackHoleGrad)" opacity="0.6" filter="url(#glow)" />
            <ellipse cx="400" cy="150" rx="120" ry="30" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3" transform="rotate(45 400 150)" />
            <ellipse cx="400" cy="150" rx="100" ry="20" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.2" transform="rotate(-30 400 150)" />
        </g>

